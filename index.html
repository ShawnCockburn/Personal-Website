<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <title>Shawn Cockburn</title>
  </head>
  <body>
    <div id="theme-toggle">
      <button onclick="toggleTheme()">🌙</button>
    </div>
    <div id="main-container">
      <header>
        <h1 id="title" class="inter-bold">Hello there 👋</h1>
        <p class="inter-light">
          I'm Shawn, and this is where I link to stuff. It's my personal corner
          of the internet. Dive in and explore what I've been up to!
        </p>
      </header>
      <main>
        <section id="links">
          <h2>Links</h2>
          <ul>
            <li>
              <a
                href="https://blog.shawncockburn.co.uk"
                target="_blank"
                class="animated-text-link"
              >
                Blog
              </a>
            </li>
            <li>
              <a
                href="https://github.com/shawncockburn"
                target="_blank"
                class="animated-text-link"
              >
                GitHub
              </a>
            </li>
            <li>
              <a
                href="https://linkedin.com/in/shawncockburn"
                target="_blank"
                class="animated-text-link"
              >
                LinkedIn
              </a>
            </li>
            <li>
              <a
                href="https://instagram.com/shawncockburn"
                target="_blank"
                class="animated-text-link"
              >
                Instagram
              </a>
            </li>
            <li>
              <a
                href="https://x.com/shawncockburn"
                target="_blank"
                class="animated-text-link"
              >
                @shawncockburn (X)
              </a>
            </li>
          </ul>
        </section>
        <section id="code">
          <h2>Code projects</h2>
          <ul>
            <li>
              <a
                href="https://github.com/shawncockburn/my-blog"
                target="_blank"
                class="animated-text-link"
              >
                Blog
              </a>
            </li>
          </ul>
        </section>
        <section id="contact">
          <h2>Contact</h2>
          <p>
            Email:
            <a
              href="mailto:hello@shawncockburn.co.uk"
              class="animated-text-link"
              >hello@shawncockburn.co.uk</a
            >
          </p>
        </section>
      </main>
    </div>
    <script>
      const THEMES = {
        LIGHT: "light",
        DARK: "dark",
        VAPORWAVE: "vaporwave",
      };
      function setThemeButton() {
        const icon = document.body.classList.contains("dark-theme")
          ? "🌙"
          : document.body.classList.contains("vaporwave-theme")
          ? "🌊"
          : "☀️";
        document.getElementById("theme-toggle").firstElementChild.textContent = icon;
      }

      function toggleTheme() {
        if (document.body.classList.contains("dark-theme")) {
          setTheme(THEMES.VAPORWAVE);
        } else if (document.body.classList.contains("vaporwave-theme")) {
          setTheme(THEMES.LIGHT);
        } else {
          setTheme(THEMES.DARK);
        }
      }

      function setTheme(theme){
        document.body.classList.toggle("dark-theme", theme === THEMES.DARK);
        document.body.classList.toggle("vaporwave-theme", theme === THEMES.VAPORWAVE);
        localStorage.setItem("theme", theme);
        setThemeButton();
      }

      const prefersDarkScheme = window.matchMedia(
        "(prefers-color-scheme: dark)"
      );

      const currentTheme = localStorage.getItem("theme");

      document.body.classList.add('notransition'); // Disable transitions for initial theme setting

      if(currentTheme != null){
        setTheme(currentTheme);
      } else {
        setTheme(prefersDarkScheme.matches ? THEMES.DARK : THEMES.LIGHT);
      }

      // Enable transitions after the initial theme is set
      setTimeout(() => {
        document.body.classList.remove('notransition');
      }, 100);

      prefersDarkScheme.addListener((e) => setTheme(e.matches ? THEMES.DARK : THEMES.LIGHT));
    </script>
  </body>
</html>
